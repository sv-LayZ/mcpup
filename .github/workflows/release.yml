name: Release

on:
  push:
    tags:
      - "v*"

# OIDC trusted publishing: no NPM_TOKEN, no OTP. npm proves the publish came
# from this exact workflow via the id-token below — configure the trusted
# publisher once on npmjs.com (see README / repo notes).
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted publishing + provenance need npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - name: Guard — tag must match packages/cli version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG != packages/cli version $PKG"
            exit 1
          fi

      - run: bun run build

      - run: bun test

      # Publish @mcpup/core first — the CLI bundles it, but it is also a public
      # package. Skip if this version is already on npm (core changes less often
      # than the CLI, so most tags republish the CLI only).
      - name: Publish @mcpup/core
        working-directory: packages/core
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@mcpup/core@$VER" version >/dev/null 2>&1; then
            echo "@mcpup/core@$VER already published — skipping"
          else
            npm publish --provenance
          fi

      - name: Publish @mcpup/cli
        working-directory: packages/cli
        run: npm publish --provenance
