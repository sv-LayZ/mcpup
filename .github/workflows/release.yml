name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      # npm (from setup-node) performs the publish — provenance support is more
      # reliable than `bun publish`. Bun still builds the bundle.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Guard — tag must match packages/cli version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG != packages/cli version $PKG"
            exit 1
          fi

      - run: bun test

      - run: bun run build

      # Publish @mcpup/core first — the CLI bundles it, but it is also a public
      # package. Skip if this version is already on npm (core changes less often
      # than the CLI, so most tags republish the CLI only).
      - name: Publish @mcpup/core
        working-directory: packages/core
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@mcpup/core@$VER" version >/dev/null 2>&1; then
            echo "@mcpup/core@$VER already published — skipping"
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mcpup/cli
        working-directory: packages/cli
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
